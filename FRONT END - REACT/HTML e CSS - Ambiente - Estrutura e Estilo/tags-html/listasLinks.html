<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas e Links - Alura</title>
</head>
<body>
    <h1>LISTAS E LINKS - Alura</h1>
    <h2>Listas Ordenadas e não ordenadas</h2>
    <!--Você pode utilizar 2 atributos type ou start-->
    <ol type="I">
        <li>Arroz</li>
        <li>Feijão</li>
        <li>Farofa</li>
    </ol>
    <hr>
    <!--Você pode utilizar o type: disc, circle e square-->
    <ul type="square">
        <li>Carro</li>
        <li>Moto</li>
        <li>Jetski</li>
    </ul>
    <hr>
    <!--Lista dentro de lista-->
    <ol>
        <li>Mercado</li>
        <ul>
            <li>Arroz</li>
            <li>Feijão</li>
        </ul>
        <li>Concessionária</li>
        <ul>
            <li>Moto</li>
            <li>Carro</li>
        </ul>
    </ol>
    <hr>
    <!--TAG DE LINK -->
    <h2>Links</h2>
    <a href="#"> Clique aqui e saiba mais </a>
    <!--Atributo target: "_blank" -> Abre em uma nova aba
        rel = "externed"
    -->
</body>
</html>
