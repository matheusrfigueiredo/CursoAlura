<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Títulos - Parágrafos - Quebras de Linhas - Formatações</title>
</head>
<body>
    <h1>Primeiras TAGS HTML</h1>
    <h2>Subtítulo</h2>
    <h3>Subtítulo</h3>
    <p> Esse é um parágrafo de texto em HTML, e não importa como eu escrevo </p>
    <p> <strong> Esse é um texto em negrito </strong>, usando uma tag semântica </p>
    <p> <em> Esse é um texto com ênfase </em>, usando uma tag semântica </p>

    <p>H<sub>2</sub>O</p>
    <p>80M<sup>2</sup></p>
</body>
</html>
