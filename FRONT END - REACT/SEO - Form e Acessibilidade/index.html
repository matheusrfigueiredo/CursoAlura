<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO - Form e Acessibilidade</title>
</head>
<body>
    <header>
        <h1> Pesquisa Online </h1>
    </header>
    <section>
        <form action = "" method = "">
            <fieldset>
            <!-- Dados Pessoais-->
            <legend> Dados Pessoais</legend>
                <label for = "userName"> Nome </label>
                <input type ="text" name = "userName" placeholder = "Digite seu nome" required>
                
                <label for = "userAge"> Idade </label>
                <input type = "number" name = "userAge" placeholder = "Digite sua idade" min = "12" max = "100" required>

                <label for = "userBirthday"> Data de Nascimento</label>
                <input type = "date" name = "userBirthday">

                <label for = "userEmail"> E-mail</label>
                <input type = "email" name = "userEmail" placeholder = "Digite seu e-mail" required>

                <label for = "userPhonenumber"> Telefone </label>
                <input type = "tel" name = "userPhonenumber" placeholder = "(00) 00000- 0000" pattern = "[0-9]{11}">

                <label for = "userImage"> Upload de Foto </label>
                <input type = "file" accept = "image/*" name = "userImage">
            </fieldset>


            <button type = "submit"> Enviar </button>
        </form>
    </sectio>        
</body>
</html>
